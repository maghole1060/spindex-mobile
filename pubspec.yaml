name: spindex_mobile
description: Spindex - Smart Road Assistance App (Arabic)
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  google_maps_flutter: ^2.5.0
  geolocator: ^9.0.2
  http: ^1.1.0
  intl: ^0.19.0
  provider: ^6.0.0
  firebase_core: ^2.24.0
  firebase_auth: ^4.14.0
  cloud_firestore: ^4.14.0
  firebase_messaging: ^14.6.0
  font_awesome_flutter: ^10.5.0
  cached_network_image: ^3.3.0
  smooth_page_indicator: ^1.1.0
  connectivity_plus: ^5.0.0
  url_launcher: ^6.1.14
  share_plus: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
